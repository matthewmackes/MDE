<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" role="img" aria-label="MDE application icon">
  <title>MDE application icon</title>
  <desc>
    Shipped window / taskbar app icon. Fixed palette baked in — charcoal
    rounded tile, brand-blue mesh penguin, white MDE mark — so it renders
    consistently across host taskbars regardless of theme. Not tintable.
    See assets/brand/README.md.
  </desc>

  <!-- Charcoal tile -->
  <rect x="0" y="0" width="256" height="256" rx="56" ry="56" fill="#1d1d1f"/>

  <!-- Mesh-network penguin, upper-centre -->
  <g transform="translate(80 28) scale(1.0)" fill="none"
     stroke="#6aa3f0" stroke-width="1.6" stroke-linejoin="round">
    <polygon points="48,4 36,10 30,26 30,46 26,72 24,96 30,110 40,114 44,108 48,110 52,108 56,114 66,110 70,94 66,70 64,48 66,40 80,44 66,34 62,16"
             fill="#1746a0" fill-opacity="0.45" stroke="#5b8def"/>
    <polygon points="48,30 40,40 38,64 40,90 48,102 56,90 58,64 56,40"
             fill="#e8f1ff" fill-opacity="0.95" stroke="#9ec5f7"/>
    <path d="M48,4 L48,30 M36,10 L48,30 M62,16 L48,30 M30,26 L40,40
             M64,48 L56,40 M30,46 L38,64 M64,48 L58,64 M26,72 L38,64
             M66,70 L58,64 M24,96 L40,90 M70,94 L56,90 M40,114 L48,102
             M66,110 L48,102 M62,16 L66,40 M66,34 L80,44"
          stroke="#7fb0f2" stroke-width="1.2"/>
    <circle cx="48" cy="30" r="3.6" fill="#9ec5f7" stroke="none"/>
    <circle cx="80" cy="44" r="2.6" fill="#9ec5f7" stroke="none"/>
    <circle cx="74" cy="104" r="3"  fill="#9ec5f7" stroke="none"/>
    <path d="M40,114 L74,104 L92,114 M74,104 L60,118"
          stroke="#7fb0f2" stroke-width="1.2"/>
  </g>

  <!-- MDE mark -->
  <text x="128" y="226" text-anchor="middle"
        font-family="'Roboto', 'Inter', system-ui, sans-serif"
        font-size="44" font-weight="800" letter-spacing="-1" fill="#ffffff">MDE</text>
</svg>
