# Node — headless mesh node preset (Q-HL4 lock).
#
# Auto-selected by `mackes init` when run on a machine without a display
# manager. Mesh-only: no theme, no panel customization, no curated apps,
# no bloat removal — fileservers shouldn't be touched outside the mesh
# subsystems. The full Mackes backend (snapshots, drift, repair, mesh-fs,
# mesh-sync, mesh-vpn, mesh-ssh, mesh-services) runs identically to a
# desktop install.

name: node
display_name: "Node"
description: >
  Headless mesh node. No theme, no panel config, no curated apps. The
  machine joins the mesh, hosts SSHFS shares, replicates the NATS
  substrate, and is eligible for the control-node election. Auto-selected
  by `mackes init` when no display is present.

appearance:
  # Intentionally empty — no display to render against.

devices:
  # Hardware probes still run for diagnostics, but no settings applied.

network:
  qnm_enabled:           true
  mesh_vpn_enabled:      true
  mesh_fs_enabled:       true
  mesh_sync_enabled:     true
  mesh_ssh_auto_keys:    true
  firewall_default_zone: "FedoraServer"

system:
  notifications_enabled: false   # no display = no notifications to surface
  autostart_extras:      []

panel:
  # No panel — headless.

apps:
  install:      []      # admin opts in to whatever they want
  remove_bloat: []      # don't strip packages without intent

snapshot:
  initial_snapshot_name: "node-baseline"
