<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 130" role="img" aria-label="MDE mesh-penguin monogram">
  <title>MDE monogram</title>
  <desc>
    Standalone mesh-network penguin — the 1:1 monogram for empty states
    and favicon-scale uses. Drawn entirely with currentColor so the
    consumer can tint the whole mark per theme (charcoal on light, white
    on dark, indigo on hover). See assets/brand/README.md.
  </desc>
  <g transform="translate(12 4)" fill="none"
     stroke="currentColor" stroke-width="1.4" stroke-linejoin="round">
    <polygon points="48,4 36,10 30,26 30,46 26,72 24,96 30,110 40,114 44,108 48,110 52,108 56,114 66,110 70,94 66,70 64,48 66,40 80,44 66,34 62,16"
             fill="currentColor" fill-opacity="0.12"/>
    <polygon points="48,30 40,40 38,64 40,90 48,102 56,90 58,64 56,40"
             fill="currentColor" fill-opacity="0.04"/>
    <path d="M48,4 L48,30 M36,10 L48,30 M62,16 L48,30 M30,26 L40,40
             M64,48 L56,40 M30,46 L38,64 M64,48 L58,64 M26,72 L38,64
             M66,70 L58,64 M24,96 L40,90 M70,94 L56,90 M40,114 L48,102
             M66,110 L48,102 M62,16 L66,40 M66,34 L80,44"
          stroke-width="1.1" opacity="0.75"/>
    <circle cx="48" cy="30" r="3.4" fill="currentColor" stroke="none"/>
    <circle cx="30" cy="26" r="2.4" fill="currentColor" stroke="none" opacity="0.7"/>
    <circle cx="64" cy="48" r="2.4" fill="currentColor" stroke="none" opacity="0.7"/>
    <circle cx="80" cy="44" r="2.4" fill="currentColor" stroke="none" opacity="0.7"/>
    <path d="M40,114 L74,104 L92,114 M74,104 L60,118 M92,114 L100,100"
          stroke-width="1.1" opacity="0.6"/>
    <circle cx="74" cy="104" r="3"   fill="currentColor" stroke="none" opacity="0.85"/>
    <circle cx="92" cy="114" r="2.4" fill="currentColor" stroke="none" opacity="0.5"/>
    <circle cx="60" cy="118" r="2"   fill="currentColor" stroke="none" opacity="0.5"/>
    <circle cx="100" cy="100" r="2"  fill="currentColor" stroke="none" opacity="0.5"/>
  </g>
</svg>
