# Mackes Shell — tag-triggered RPM build + GitHub Release publication.
#
# Pushing a tag matching v* (e.g. `git push origin v1.0.0`) fires this
# workflow. Inside a Fedora 44 container, we install build deps + run
# `make rpm` (which produces an sdist, then runs rpmbuild against the
# .spec — itself compiling the C panel plugin in %build), then create
# a GitHub Release with:
#
#   - mackes-shell-<version>-1.fc44.x86_64.rpm   (binary RPM, x86_64)
#   - mackes-shell-<version>-1.fc44.src.rpm      (source RPM)
#   - install.sh, uninstall.sh                   (so the curl-pipe-bash
#                                                 bootstrap can find the
#                                                 scripts attached to the
#                                                 same release)
#
# The release body is autogenerated from the matching section in
# CHANGELOG.md (everything between `## <version>` and the next `## `).

name: Release RPM

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write          # softprops/action-gh-release needs to create releases

jobs:
  build-and-release:
    name: Build RPM + cut Release
    runs-on: ubuntu-latest
    container:
      image: fedora:44
    steps:
      - name: Install build dependencies
        run: |
          dnf install -y \
              git rpm-build rpmdevtools dnf-plugins-core \
              python3 python3-build python3-pyyaml \
              gcc make pkgconfig \
              gtk3-devel xfce4-panel-devel libxfce4ui-devel
          rpm -E '%fedora'

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # actions/checkout chowns to a non-root user inside containers; we
      # need to mark this dir as safe for git operations.
      - name: Mark workspace safe for git
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Resolve version from tag
        id: version
        run: |
          TAG="${GITHUB_REF##*/}"
          VER="${TAG#v}"
          echo "tag=$TAG"   >> "$GITHUB_OUTPUT"
          echo "ver=$VER"   >> "$GITHUB_OUTPUT"
          # Sanity: ensure mackes/__init__.py matches the tag
          IN_REPO=$(python3 -c "import sys; sys.path.insert(0, '.'); import mackes; print(mackes.__version__)")
          if [ "$IN_REPO" != "$VER" ]; then
            echo "::error::tag $TAG → version $VER does not match mackes.__version__=$IN_REPO" >&2
            exit 1
          fi
          echo "OK — tag matches mackes.__version__ ($VER)"

      - name: Build sdist + RPM
        run: |
          make rpm
          ls -la rpmbuild/RPMS/x86_64/ rpmbuild/SRPMS/

      - name: Extract release notes from CHANGELOG.md
        id: notes
        run: |
          VER="${{ steps.version.outputs.ver }}"
          awk -v ver="$VER" '
            BEGIN { in_section = 0 }
            /^## / {
              if (in_section) exit
              if ($0 ~ "^## " ver "( |$|—)") in_section = 1
              else next
            }
            in_section { print }
          ' CHANGELOG.md > release-notes.md
          if [ ! -s release-notes.md ]; then
            echo "Mackes Shell $VER" > release-notes.md
            echo "" >> release-notes.md
            echo "See [CHANGELOG.md](CHANGELOG.md) for the full feature list." >> release-notes.md
          fi
          echo "--- release notes preview ---"
          head -40 release-notes.md

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name:  ${{ steps.version.outputs.tag }}
          name:      "Mackes Shell ${{ steps.version.outputs.ver }}"
          body_path: release-notes.md
          draft:     false
          prerelease: false
          fail_on_unmatched_files: true
          files: |
            rpmbuild/RPMS/x86_64/mackes-shell-${{ steps.version.outputs.ver }}-1.fc44.x86_64.rpm
            rpmbuild/SRPMS/mackes-shell-${{ steps.version.outputs.ver }}-1.fc44.src.rpm
            install.sh
            uninstall.sh
